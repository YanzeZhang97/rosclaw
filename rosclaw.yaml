# ROSClaw Workspace Configuration
# Generated by `rosclaw init`

robot_id: rosclaw_bot
safety_level: MODERATE

# Robot model (e-URDF or MuJoCo XML)
robot_model_path: ""

# Module toggles
enable_firewall: true
enable_memory: true
enable_practice: true
enable_auto: true
enable_darwin: true
enable_know: true
enable_how: true
enable_swarm: false

# LLM Provider
llm:
  provider: deepseek
  model: deepseek-chat
  # api_key: set via ROSCLAW_API_KEY env var

# Practice / Timeline
practice:
  output_dir: ./practice_data
  auto_record: true

# SeekDB
memory:
  backend: memory
  # backend: sqlite
  # db_path: ./rosclaw.db

# Auto Self-Evolution Control Plane
auto:
  enabled: true
  trigger:
    repeated_failure_threshold: 3
    min_failure_severity: medium
    benchmark_regression_threshold: 0.05
    idle_window_enabled: true
  patch_policy:
    allow_config_patch: true
    allow_skill_param_patch: true
    allow_skill_graph_patch: true
    allow_code_patch: false
    require_human_approval_for_code: true
    require_human_approval_for_safety_config: true
  store_path: ./.rosclaw_auto

# Darwin Evaluation Pressure
darwin:
  enabled: true
  default_seeds: 10
  default_episodes: 50
  metrics:
    - success_rate
    - collision_rate
    - completion_time
  stress_scenarios:
    - pick_cube_heavy
    - pick_cube_occluded
    - valve_tight
    - button_small

# Know Knowledge Compiler
know:
  enabled: true
  assets_dir: ./know_assets
  bridge_index_path: ./know_assets/bridge_index.json
  failure_taxonomy_path: ./know_assets/failure_taxonomy.yaml
  auto_ingest_evidence: true

# How Runtime Intervention Controller
how:
  enabled: true
  cooldown_window: 3
  strategies:
    - NOOP
    - FREE_EXPLORATION
    - SAFETY
    - CATALYST
    - DIAGNOSE
    - FEASIBILITY_REPAIR
    - STABILIZE
    - DIVERSIFY
    - EXPLOIT_BEST
    - ESCALATE_TO_KNOW
    - STOP_UNSAFE
  evidence_trace_enabled: true
