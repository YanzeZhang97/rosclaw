# ROSClaw Extended URDF (e-URDF) — Skydio X2
# Physical DNA Registry Entry
# https://www.skydio.com/skydio-x2

robot_id: skydio_x2
name: Skydio X2
vendor: Skydio
version: "2.0"
description: >
  Professional autonomous quadcopter drone with 4 rotors, ~1.3kg mass,
  35-minute flight time, and advanced AI-powered obstacle avoidance
  via 6 navigation cameras. Designed for aerial surveillance,
  inspection, and photogrammetry.

# ── Kinematics ──
dof: 6
links:
  - name: base_link
    type: base
    mass: 1.3
    inertia:
      ixx: 0.012
      iyy: 0.012
      izz: 0.022
  - name: arm_front_left
    type: link
    mass: 0.05
  - name: arm_front_right
    type: link
    mass: 0.05
  - name: arm_rear_left
    type: link
    mass: 0.05
  - name: arm_rear_right
    type: link
    mass: 0.05
  - name: propeller_fl
    type: end_effector
    mass: 0.01
  - name: propeller_fr
    type: end_effector
    mass: 0.01
  - name: propeller_rl
    type: end_effector
    mass: 0.01
  - name: propeller_rr
    type: end_effector
    mass: 0.01

joints:
  - name: arm_fl_joint
    type: fixed
    parent: base_link
    child: arm_front_left
    origin:
      xyz: [0.18, 0.18, 0.0]
  - name: arm_fr_joint
    type: fixed
    parent: base_link
    child: arm_front_right
    origin:
      xyz: [0.18, -0.18, 0.0]
  - name: arm_rl_joint
    type: fixed
    parent: base_link
    child: arm_rear_left
    origin:
      xyz: [-0.18, 0.18, 0.0]
  - name: arm_rr_joint
    type: fixed
    parent: base_link
    child: arm_rear_right
    origin:
      xyz: [-0.18, -0.18, 0.0]
  - name: motor_fl_joint
    type: continuous
    parent: arm_front_left
    child: propeller_fl
    axis: [0, 0, 1]
    limits:
      velocity: 1047.2  # rad/s (~10000 RPM)
      effort: 10.0
  - name: motor_fr_joint
    type: continuous
    parent: arm_front_right
    child: propeller_fr
    axis: [0, 0, 1]
    limits:
      velocity: 1047.2
      effort: 10.0
  - name: motor_rl_joint
    type: continuous
    parent: arm_rear_left
    child: propeller_rl
    axis: [0, 0, 1]
    limits:
      velocity: 1047.2
      effort: 10.0
  - name: motor_rr_joint
    type: continuous
    parent: arm_rear_right
    child: propeller_rr
    axis: [0, 0, 1]
    limits:
      velocity: 1047.2
      effort: 10.0

# ── Sensors ──
sensors:
  - name: front_stereo_camera
    type: camera
    parent_link: base_link
    origin:
      xyz: [0.08, 0.0, 0.03]
      rpy: [0, 0, 0]
    resolution: [1920, 1080]
    fov: 82.0
    near: 0.1
    far: 200.0
    fps: 30
    stereo_baseline: 0.08
  - name: rear_stereo_camera
    type: camera
    parent_link: base_link
    origin:
      xyz: [-0.08, 0.0, 0.03]
      rpy: [0, 0, 3.14159]
    resolution: [1920, 1080]
    fov: 82.0
    near: 0.1
    far: 200.0
    fps: 30
    stereo_baseline: 0.08
  - name: left_stereo_camera
    type: camera
    parent_link: base_link
    origin:
      xyz: [0.0, 0.08, 0.03]
      rpy: [0, 0, 1.5708]
    resolution: [1280, 720]
    fov: 90.0
    near: 0.1
    far: 100.0
    fps: 30
    stereo_baseline: 0.06
  - name: right_stereo_camera
    type: camera
    parent_link: base_link
    origin:
      xyz: [0.0, -0.08, 0.03]
      rpy: [0, 0, -1.5708]
    resolution: [1280, 720]
    fov: 90.0
    near: 0.1
    far: 100.0
    fps: 30
    stereo_baseline: 0.06
  - name: imu
    type: imu
    parent_link: base_link
    noise_std:
      accel: 0.01
      gyro: 0.001
      mag: 0.0005
  - name: gps
    type: gps
    parent_link: base_link
    noise_std:
      position: 1.0
      velocity: 0.1
    update_rate: 10.0
  - name: barometer
    type: altimeter
    parent_link: base_link
    noise_std: 0.1
    range: [0, 5000]

# ── Actuators ──
actuators:
  - name: motor_fl
    type: brushless_motor
    joint: motor_fl_joint
    max_rpm: 10000
    kv_rating: 900
    max_current: 25.0
    control_mode: [velocity, thrust]
    thrust_coefficient: 1.2e-5
  - name: motor_fr
    type: brushless_motor
    joint: motor_fr_joint
    max_rpm: 10000
    kv_rating: 900
    max_current: 25.0
    control_mode: [velocity, thrust]
    thrust_coefficient: 1.2e-5
  - name: motor_rl
    type: brushless_motor
    joint: motor_rl_joint
    max_rpm: 10000
    kv_rating: 900
    max_current: 25.0
    control_mode: [velocity, thrust]
    thrust_coefficient: 1.2e-5
  - name: motor_rr
    type: brushless_motor
    joint: motor_rr_joint
    max_rpm: 10000
    kv_rating: 900
    max_current: 25.0
    control_mode: [velocity, thrust]
    thrust_coefficient: 1.2e-5

# ── Safety Limits ──
safety_limits:
  velocity_limits:
    max_horizontal_speed: 25.0
    max_vertical_speed: 8.0
    max_angular_rate: 3.14
  altitude_limits:
    max_agl: 120.0
    max_above_takeoff: 500.0
  geofence:
    type: cylinder
    radius: 1000.0
    height_max: 500.0
  battery_limits:
    min_voltage: 14.0
    max_voltage: 16.8
    min_capacity_percent: 15.0
  motor_limits:
    max_rpm: 10000
    max_temperature: 80.0
  collision_avoidance:
    enabled: true
    min_distance: 2.0
    reaction_time_ms: 100.0

# ── Capabilities ──
capabilities:
  - name: aerial_surveillance
    type: aerial
    skill_type: programmed
    parameters:
      area: {type: polygon, description: "Survey area boundary"}
      altitude: {type: float, default: 50.0, unit: m}
      overlap: {type: float, default: 0.8}
    sensors_used: [front_stereo_camera, gps]
  - name: waypoint_navigation
    type: aerial
    skill_type: programmed
    parameters:
      waypoints: {type: list, description: "List of GPS waypoints"}
      speed: {type: float, default: 10.0, unit: m/s}
      hover_time: {type: float, default: 0.0, unit: s}
    sensors_used: [gps, imu, front_stereo_camera]
  - name: object_tracking
    type: perception
    skill_type: autonomous
    parameters:
      target_class: {type: str, description: "Object class to track"}
      min_confidence: {type: float, default: 0.7}
      follow_distance: {type: float, default: 10.0, unit: m}
    sensors_used: [front_stereo_camera, imu]
  - name: photogrammetry
    type: aerial
    skill_type: composed
    parameters:
      area: {type: polygon}
      gsd: {type: float, default: 0.01, unit: m/pixel}
      overlap: {type: float, default: 0.8}
    sensors_used: [front_stereo_camera, rear_stereo_camera, gps]

# ── Simulation Backends ──
simulation_backends:
  mujoco:
    model_file: robot.mjcf.xml
    timestep: 0.001
    integrator: implicitfast
    solver: newton
    iterations: 50
    ls_iterations: 10
    gravity: [0, 0, -9.81]
    contact:
      friction: [0.5, 0.005, 0.0001]
      solref: [0.02, 1.0]
      solimp: [0.9, 0.95, 0.001]
  isaac:
    model_file: robot.urdf
    stage_units: meters
    physics_dt: 0.00833
    rendering_dt: 0.01667
    gpu_physics: true
  gazebo:
    model_file: robot.urdf
    physics_engine: ode
    max_step_size: 0.001
    real_time_factor: 1.0

# ── Semantic Tags ──
semantic_tags:
  - quadcopter
  - aerial
  - autonomous
  - obstacle_avoidance
  - surveillance
  - photogrammetry
  - gps_guided
  - professional
  - outdoor

# ── Metadata ──
metadata:
  urdf_version: "1.0"
  ros2_package: skydio_x2_description
  flight_controller: skydio_autonomy
  propeller_diameter: 0.25
  max_flight_time_min: 35
  max_range_km: 6.0
  wind_resistance: 12.0
  ip_rating: IP45
  certification: [FAA_Part_107, EASA_C1]
