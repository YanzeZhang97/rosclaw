safety_level: STRICT

# Drone-specific safety parameters
flight_envelope:
  max_horizontal_speed: 25.0
  max_vertical_speed: 8.0
  max_angular_rate: 3.14
  max_bank_angle: 0.785
  max_climb_rate: 8.0
  max_descent_rate: 5.0

altitude_limits:
  max_agl: 120.0
  max_above_takeoff: 500.0
  min_agl: 2.0

geofence:
  type: cylinder
  center: [0, 0]
  radius: 1000.0
  height_min: 0.0
  height_max: 500.0
  action: RTL  # Return to Launch

battery_safety:
  min_voltage: 14.0
  max_voltage: 16.8
  min_capacity_percent: 15.0
  critical_capacity_percent: 10.0
  action_at_critical: forced_landing

motor_safety:
  max_rpm: 10000
  max_temperature: 80.0
  imbalance_threshold: 0.15

collision_avoidance:
  enabled: true
  min_distance: 2.0
  reaction_time_ms: 100.0
  sensors:
    - front_stereo_camera
    - rear_stereo_camera
    - left_stereo_camera
    - right_stereo_camera
  action: hover

return_to_launch:
  enabled: true
  trigger_conditions:
    - low_battery
    - signal_loss
    - geofence_breach
  rtl_altitude: 50.0

emergency_procedures:
  signal_loss:
    timeout_sec: 5.0
    action: RTL
  gps_loss:
    action: altitude_hold
    max_duration_sec: 30.0
  motor_failure:
    action: emergency_landing
    min_motors_required: 3

environment:
  max_wind_speed: 12.0
  max_temperature: 50.0
  min_temperature: -10.0
  max_humidity: 90.0
  ip_rating: IP45
  no_fly_zones:
    enabled: true
    database: airmap
